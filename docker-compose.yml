

services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/jobtracker
      - JWT_SECRET=rabbitinhat
    depends_on:
      - db
    command: sh -c "until nc -z db 5432; do sleep 1; done && npm run migrate && npm run dev"

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=jobtracker
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:      
  postgres_data: